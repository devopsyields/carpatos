<?xml version="1.0" encoding="UTF-8"?>
<!-- carpatos-logo.svg — logo CarpatOS, 256x256, folosit in os-release LOGO,
     plymouth, gdm. Cerc inchis cu 3 piscuri si o stea. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3252"/>
      <stop offset="1" stop-color="#0c1828"/>
    </linearGradient>
    <linearGradient id="munti" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5e6d3"/>
      <stop offset="1" stop-color="#d4a04a"/>
    </linearGradient>
  </defs>

  <!-- Fundal cerc -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#d4a04a" stroke-width="4"/>

  <!-- Stea deasupra muntelui central -->
  <path fill="#f5e6c8" d="M128,52 L132,68 L148,68 L135,78 L140,94 L128,84 L116,94 L121,78 L108,68 L124,68 Z"/>

  <!-- Munti (3 piscuri stilizate) -->
  <path fill="url(#munti)" d="
    M40,200
    L70,150 L92,180 L128,110 L164,180 L186,150 L216,200 Z"/>

  <!-- Linie orizont -->
  <line x1="40" y1="200" x2="216" y2="200" stroke="#d4a04a" stroke-width="2"/>

  <!-- Text "CarpatOS" sub munti -->
  <text x="128" y="232" font-family="DejaVu Sans, sans-serif" font-size="22"
        font-weight="600" fill="#f5e6d3" text-anchor="middle"
        letter-spacing="2">CarpatOS</text>
</svg>
